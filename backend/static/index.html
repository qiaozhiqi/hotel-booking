<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒店预订系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f7fa;
      color: #333;
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    ul, ol { list-style: none; }
    img { max-width: 100%; height: auto; }
    button { cursor: pointer; font-family: inherit; }

    .header {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .logo-icon { font-size: 28px; margin-right: 8px; }
    .logo-text { font-size: 20px; font-weight: 600; color: #1a73e8; }
    .nav { display: flex; gap: 30px; }
    .nav-link {
      font-size: 16px;
      color: #666;
      transition: color 0.2s;
      padding: 8px 0;
      border-bottom: 2px solid transparent;
    }
    .nav-link:hover, .nav-link.active { color: #1a73e8; border-bottom-color: #1a73e8; }
    .user-area { display: flex; align-items: center; gap: 15px; }
    .user-name { color: #333; font-size: 14px; }
    .btn-login {
      padding: 8px 20px;
      background: #1a73e8;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #1557b0; }
    .btn-logout {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid #ddd;
      color: #666;
      border-radius: 4px;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #1a73e8; color: #1a73e8; }

    .main { min-height: calc(100vh - 120px); max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .footer {
      background: #f8f9fa;
      padding: 20px 0;
      text-align: center;
      color: #999;
      font-size: 14px;
      margin-top: 40px;
    }

    .search-section {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      margin: 30px -20px;
      padding: 60px 20px;
      border-radius: 12px;
    }
    .search-content { max-width: 900px; margin: 0 auto; text-align: center; }
    .search-title { color: #fff; font-size: 36px; font-weight: 600; margin-bottom: 12px; }
    .search-subtitle { color: rgba(255, 255, 255, 0.8); font-size: 16px; margin-bottom: 40px; }
    .search-box {
      display: flex;
      gap: 16px;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      flex-wrap: wrap;
    }
    .search-item { flex: 1; min-width: 140px; text-align: left; }
    .search-label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; }
    .search-select, .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-select:focus, .search-input:focus { border-color: #1a73e8; }
    .search-btn {
      align-self: flex-end;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .search-btn:hover { background: #1557b0; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .section-title { font-size: 24px; font-weight: 600; color: #333; }
    .section-subtitle { font-size: 14px; color: #999; }

    .hotel-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .hotel-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hotel-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12); }
    .hotel-image { position: relative; height: 200px; background: #f5f5f5; }
    .hotel-image img { width: 100%; height: 100%; object-fit: cover; }
    .hotel-rating {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .rating-value { font-size: 14px; font-weight: 600; color: #f59e0b; }
    .hotel-info { padding: 16px; }
    .hotel-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hotel-location {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hotel-desc {
      font-size: 13px;
      color: #999;
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hotel-price { display: flex; align-items: baseline; gap: 8px; }
    .price-label { font-size: 13px; color: #999; }
    .price-value { font-size: 20px; font-weight: 600; color: #e74c3c; }

    .empty-state { text-align: center; padding: 80px 0; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-text { font-size: 15px; color: #999; margin-bottom: 24px; }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
    }
    .page-btn {
      padding: 10px 24px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) { border-color: #1a73e8; color: #1a73e8; }
    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .page-info { font-size: 14px; color: #666; }

    .hotel-header {
      display: flex;
      gap: 30px;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin: 30px 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      flex-wrap: wrap;
    }
    .hotel-image-large {
      width: 400px;
      height: 280px;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f5f5;
      flex-shrink: 0;
    }
    .hotel-image-large img { width: 100%; height: 100%; object-fit: cover; }
    .hotel-info-large { flex: 1; min-width: 300px; }
    .hotel-name-large { font-size: 28px; font-weight: 600; color: #333; margin-bottom: 16px; }
    .hotel-meta { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 6px; }
    .meta-text { font-size: 14px; color: #666; }
    .meta-text.rating-high { color: #f59e0b; font-weight: 600; }
    .hotel-desc-large {
      font-size: 14px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .price-range-large { display: flex; align-items: baseline; gap: 8px; }
    .price-value-large { font-size: 24px; font-weight: 600; color: #e74c3c; }

    .rooms-section {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .room-list { display: flex; flex-direction: column; gap: 20px; }
    .room-card {
      display: flex;
      gap: 20px;
      padding: 20px;
      border: 1px solid #eee;
      border-radius: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
      flex-wrap: wrap;
    }
    .room-card:hover { border-color: #1a73e8; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.1); }
    .room-image {
      width: 220px;
      height: 160px;
      border-radius: 6px;
      overflow: hidden;
      background: #f5f5f5;
      flex-shrink: 0;
    }
    .room-image img { width: 100%; height: 100%; object-fit: cover; }
    .room-info { flex: 1; min-width: 250px; }
    .room-name { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 12px; }
    .room-features { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .feature-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #f5f7fa;
      border-radius: 4px;
      font-size: 13px;
      color: #666;
    }
    .room-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 12px; }
    .room-amenities { font-size: 13px; margin-bottom: 12px; }
    .amenities-label { color: #999; }
    .room-availability { font-size: 13px; }
    .room-availability.available .available-text { color: #27ae60; }
    .unavailable-text { color: #e74c3c; }
    .room-price-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      flex-shrink: 0;
      min-width: 140px;
    }
    .room-price { display: flex; align-items: baseline; margin-bottom: 12px; }
    .price-currency { font-size: 14px; color: #e74c3c; }
    .price-num { font-size: 28px; font-weight: 600; color: #e74c3c; }
    .price-unit { font-size: 13px; color: #999; }
    .btn-book {
      padding: 10px 28px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-book:hover:not(:disabled) { background: #1557b0; }
    .btn-book:disabled { background: #ccc; cursor: not-allowed; }

    .btn-back {
      display: inline-block;
      padding: 12px 32px;
      background: #1a73e8;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-back:hover { background: #1557b0; }

    .orders-header { margin-bottom: 24px; padding-top: 30px; }
    .page-title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 20px; }
    .status-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-tab {
      padding: 8px 20px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .status-tab:hover { border-color: #1a73e8; color: #1a73e8; }
    .status-tab.active { background: #1a73e8; border-color: #1a73e8; color: #fff; }

    .orders-list { display: flex; flex-direction: column; gap: 16px; }
    .order-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08); }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-info { display: flex; gap: 20px; flex-wrap: wrap; }
    .order-no { font-size: 14px; color: #333; font-weight: 500; }
    .order-date { font-size: 13px; color: #999; }
    .order-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #d1ecf1; color: #0c5460; }
    .status-checked { background: #d4edda; color: #155724; }
    .status-done { background: #e8f0fe; color: #1a73e8; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    .order-content {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      padding: 20px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .hotel-info { flex: 1; min-width: 250px; }
    .stay-dates {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .date-item { display: flex; flex-direction: column; gap: 4px; }
    .date-label { font-size: 12px; color: #999; }
    .date-value { font-size: 14px; color: #333; font-weight: 500; }
    .date-arrow { font-size: 16px; color: #ccc; }
    .guest-info { display: flex; gap: 20px; flex-wrap: wrap; }
    .guest-item { font-size: 13px; color: #666; }
    .price-actions {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      flex-shrink: 0;
      min-width: 150px;
    }
    .price-info { text-align: right; }
    .order-actions { margin-top: 16px; }
    .btn-cancel-order {
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      border-radius: 6px;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-cancel-order:hover { background: #e74c3c; color: #fff; }

    .btn-go-book {
      display: inline-block;
      padding: 12px 32px;
      background: #1a73e8;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-go-book:hover { background: #1557b0; }

    .login-page {
      min-height: calc(100vh - 180px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-subtitle { font-size: 14px; color: #999; }
    .tab-switch {
      display: flex;
      margin-bottom: 24px;
      background: #f5f7fa;
      border-radius: 8px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: #1a73e8; }
    .tab-btn.active {
      background: #fff;
      color: #1a73e8;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .login-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 14px; color: #333; font-weight: 500; }
    .form-input {
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #1a73e8; }
    .btn-submit {
      padding: 14px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover:not(:disabled) { background: #1557b0; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    .form-tip { font-size: 12px; color: #999; text-align: center; margin-top: -8px; }
    .login-footer { text-align: center; margin-top: 24px; }
    .link-home { font-size: 14px; color: #1a73e8; }
    .link-home:hover { text-decoration: underline; }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      margin: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
    }
    .modal-title { font-size: 18px; font-weight: 600; color: #333; }
    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      font-size: 24px;
      color: #999;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .modal-close:hover { background: #f5f5f5; }
    .modal-body { padding: 24px; }
    .booking-summary {
      padding: 16px;
      background: #f5f7fa;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .booking-form { margin-bottom: 20px; }
    .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .booking-price-summary { border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
    .price-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      font-size: 14px;
    }
    .price-row.total { background: #fafafa; font-weight: 600; }
    .price-amount.total { color: #e74c3c; font-size: 16px; }
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 20px 24px;
      border-top: 1px solid #eee;
    }
    .btn-cancel {
      padding: 10px 24px;
      background: transparent;
      border: 1px solid #ddd;
      color: #666;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: #999; }
    .btn-confirm {
      padding: 10px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-confirm:hover:not(:disabled) { background: #1557b0; }
    .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }

    .confirm-modal { text-align: center; padding: 40px; }
    .modal-icon { font-size: 56px; margin-bottom: 16px; }
    .modal-text { font-size: 14px; color: #666; margin-bottom: 30px; }
    .modal-actions { display: flex; gap: 16px; justify-content: center; }
    .btn-secondary {
      padding: 12px 28px;
      background: #f5f5f5;
      border: none;
      color: #666;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger {
      padding: 12px 28px;
      background: #e74c3c;
      border: none;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-danger:hover:not(:disabled) { background: #c0392b; }
    .btn-danger:disabled { opacity: 0.7; cursor: not-allowed; }

    .success-modal { text-align: center; padding: 40px; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 600; color: #333; margin-bottom: 12px; }
    .success-text { font-size: 14px; color: #666; margin-bottom: 30px; }
    .success-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: 12px 28px;
      background: #1a73e8;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1557b0; }

    .loading { text-align: center; padding: 80px 0; }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
      animation: fadeIn 0.3s ease;
    }
    .toast.success { background: #d4edda; color: #155724; }
    .toast.error { background: #f8d7da; color: #721c24; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .hotel-supplier-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;

  <script>
    const api = {
      baseURL: '/api',
      async request(endpoint, options = {}) {
        const url = this.baseURL + endpoint;
        const config = {
          headers: {
            'Content-Type': 'application/json',
            ...options.headers
          },
          ...options
        };

        const user = localStorage.getItem('user');
        if (user) {
          const userData = JSON.parse(user);
          config.headers['X-User-ID'] = userData.id;
        }

        try {
          const response = await fetch(url, config);
          return await response.json();
        } catch (error) {
          console.error('API请求失败:', error);
          throw error;
        }
      },

      get(endpoint) {
        return this.request(endpoint, { method: 'GET' });
      },

      post(endpoint, data) {
        return this.request(endpoint, {
          method: 'POST',
          body: JSON.stringify(data)
        });
      }
    };

    const state = {
      user: null,
      hotels: [],
      currentHotel: null,
      rooms: [],
      orders: [],
      cities: [],
      selectedCity: '',
      currentPage: 1,
      pageSize: 6,
      total: 0,
      orderStatus: '',
      selectedRoom: null,
      filterOptions: {
        bed_types: [],
        amenities: [],
        price_range: { min: 100, max: 5000 }
      },
      filters: {
        minPrice: 100,

    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    function getTomorrow() {
      const tomorrow = new Date(Date.now() + 86400000);
      return tomorrow.toISOString().split('T')[0];
    }

    function getMaxDate() {
      const maxDate = new Date(Date.now() + 90 * 86400000);
      return maxDate.toISOString().split('T')[0];
    }

    function initCalendar() {
      state.calendar.checkIn = getToday();
      state.calendar.checkOut = getTomorrow();
      state.calendar.currentMonth = new Date();
    }

    function isDateSelectable(dateStr) {
      const today = getToday();
      const maxDate = getMaxDate();
      return dateStr >= today && dateStr <= maxDate;
    }

    function isWeekend(dateStr) {
      const date = new Date(dateStr);
      const day = date.getDay();
      return day === 0 || day === 6;
    }

    function getDayPrice(dateStr, basePrice) {
      if (!basePrice) return null;
      const price = isWeekend(dateStr) ? Math.round(basePrice * 1.2) : basePrice;
      return price;
    }

    function formatDateDisplay(dateStr) {
      const date = new Date(dateStr);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const weekday = weekdays[date.getDay()];
      return `${month}月${day}日 ${weekday}`;
    }

    function getNights() {
      if (!state.calendar.checkIn || !state.calendar.checkOut) return 0;
      const start = new Date(state.calendar.checkIn);
      const end = new Date(state.calendar.checkOut);
      return Math.max(0, Math.floor((end - start) / (1000 * 60 * 60 * 24)));
    }

    function selectCalendarDate(dateStr) {
      if (!isDateSelectable(dateStr)) return;

      if (!state.calendar.checkIn || (state.calendar.checkIn && state.calendar.checkOut)) {
        state.calendar.checkIn = dateStr;
        state.calendar.checkOut = null;
      } else {
        if (dateStr < state.calendar.checkIn) {
          state.calendar.checkIn = dateStr;
        } else if (dateStr === state.calendar.checkIn) {
          const tomorrow = new Date(dateStr);
          tomorrow.setDate(tomorrow.getDate() + 1);
          const tomorrowStr = tomorrow.toISOString().split('T')[0];
          if (isDateSelectable(tomorrowStr)) {
            state.calendar.checkOut = tomorrowStr;
          }
        } else {
          state.calendar.checkOut = dateStr;
        }
      }

      renderCalendar();
      updateDateFilterInfo();
    }

    function prevMonth() {
      const current = new Date(state.calendar.currentMonth);
      current.setMonth(current.getMonth() - 1);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      if (current.getMonth() < today.getMonth() && current.getFullYear() === today.getFullYear()) {
        return;
      }
      if (current.getFullYear() < today.getFullYear()) {
        return;
      }
      state.calendar.currentMonth = current;
      renderCalendar();
    }

    function nextMonth() {
      const current = new Date(state.calendar.currentMonth);
      current.setMonth(current.getMonth() + 1);
      const maxDate = new Date(getMaxDate());
      if (current.getFullYear() > maxDate.getFullYear() || 
          (current.getFullYear() === maxDate.getFullYear() && current.getMonth() > maxDate.getMonth())) {
        return;
      }
      state.calendar.currentMonth = current;
      renderCalendar();
    }

    function renderCalendar() {
      const calendarContainer = document.getElementById('calendar-container');
      if (!calendarContainer) return;

      const year = state.calendar.currentMonth.getFullYear();
      const month = state.calendar.currentMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const today = new Date(getToday());
      today.setHours(0, 0, 0, 0);

      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                          '七月', '八月', '九月', '十月', '十一月', '十二月'];

      const startDayOfWeek = firstDay.getDay();
      const daysInMonth = lastDay.getDate();

      const basePrice = state.rooms.length > 0 ? (state.rooms[0].best_price || state.rooms[0].price) : 0;

      let daysHtml = '';

      for (let i = 0; i < startDayOfWeek; i++) {
        daysHtml += `<div class="calendar-day empty"></div>`;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const dateStr = date.toISOString().split('T')[0];
        const selectable = isDateSelectable(dateStr);
        const isTodayDate = date.getTime() === today.getTime();
        const isWeekendDate = isWeekend(dateStr);
        const isCheckIn = dateStr === state.calendar.checkIn;
        const isCheckOut = dateStr === state.calendar.checkOut;
        
        let isInRange = false;
        if (state.calendar.checkIn && state.calendar.checkOut) {
          const checkInDate = new Date(state.calendar.checkIn);
          const checkOutDate = new Date(state.calendar.checkOut);
          isInRange = date > checkInDate && date < checkOutDate;
        }

        const dayPrice = basePrice > 0 ? getDayPrice(dateStr, basePrice) : null;

        let classes = 'calendar-day';
        if (!selectable) classes += ' disabled';
        if (isTodayDate) classes += ' today';
        if (isCheckIn || isCheckOut) classes += ' selected';
        if (isInRange) classes += ' in-range';
        if (isWeekendDate) classes += ' weekend';

        let checkIndicator = '';
        if (isCheckIn) checkIndicator += '<span class="day-check-indicator check-in">入住</span>';
        if (isCheckOut) checkIndicator += '<span class="day-check-indicator check-out">离店</span>';

        daysHtml += `
          <div class="${classes}" onclick="selectCalendarDate('${dateStr}')" data-date="${dateStr}">
            ${checkIndicator}
            <span class="day-number">${day}</span>
            ${dayPrice ? `<span class="day-price">¥${dayPrice}</span>` : ''}
          </div>
        `;
      }

      const maxDateObj = new Date(getMaxDate());
      const canGoNext = !(month === maxDateObj.getMonth() && year === maxDateObj.getFullYear());
      const canGoPrev = !(month === today.getMonth() && year === today.getFullYear());

      calendarContainer.innerHTML = `
        <div class="calendar-header">
          <button class="calendar-nav-btn" onclick="prevMonth()" ${!canGoPrev ? 'disabled' : ''}>‹</button>
          <span class="calendar-month">${year}年 ${monthNames[month]}</span>
          <button class="calendar-nav-btn" onclick="nextMonth()" ${!canGoNext ? 'disabled' : ''}>›</button>
        </div>
        <div class="calendar-weekdays">
          ${weekdays.map((w, i) => `
            <div class="calendar-weekday ${(i === 0 || i === 6) ? 'weekend' : ''}">${w}</div>
          `).join('')}
        </div>
        <div class="calendar-days">
          ${daysHtml}
        </div>
        <div class="price-legend">
          <div class="price-legend-item">
            <span class="price-legend-dot selected"></span>
            <span>入住/离店</span>
          </div>
          <div class="price-legend-item">
            <span class="price-legend-dot in-range"></span>
            <span>日期范围</span>
          </div>
          <div class="price-legend-item">
            <span class="price-legend-dot weekend"></span>
            <span>周末溢价</span>
          </div>
          <div class="price-legend-item">
            <span class="price-legend-dot disabled"></span>
            <span>不可选</span>
          </div>
        </div>
        <div class="calendar-tip">
          <span class="calendar-tip-icon">💡</span>
          <span>点击日期选择入住和离店日期，周末价格上浮20%，仅可选择未来90天内的日期</span>
        </div>
      `;
    }

    function updateDateFilterInfo() {
      const checkInEl = document.getElementById('selected-check-in');
      const checkOutEl = document.getElementById('selected-check-out');
      const nightsEl = document.getElementById('selected-nights');

      if (checkInEl && state.calendar.checkIn) {
        checkInEl.textContent = formatDateDisplay(state.calendar.checkIn);
      }
      if (checkOutEl && state.calendar.checkOut) {
        checkOutEl.textContent = formatDateDisplay(state.calendar.checkOut);
      }
      if (nightsEl) {
        const nights = getNights();
        nightsEl.textContent = nights > 0 ? `共 ${nights} 晚` : '请选择离店日期';
      }
    }

    function updateNav(active) {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      if (active) {
        document.getElementById(`nav-${active}`)?.classList.add('active');
      }
    }

    async function loadCities() {
      try {
        const res = await api.get('/cities');
        if (res.code === 200) {
          state.cities = res.data;
          const select = document.getElementById('city-select');
          if (select) {
            state.cities.forEach(city => {
              const option = document.createElement('option');
              option.value = city;
              option.textContent = city;
              select.appendChild(option);
            });
          }
        }
      } catch (error) {
        console.error('加载城市失败:', error);
      }
    }

    async function loadHotels() {
      const section = document.getElementById('hotel-section');
      try {
        const params = new URLSearchParams({
          page: state.currentPage,
          page_size: state.pageSize
        });
        if (state.selectedCity) {
          params.append('city', state.selectedCity);
        }
        if (state.filters.minPrice > 0) {
          params.append('min_price', state.filters.minPrice);
        }
        if (state.filters.maxPrice < 999999) {
          params.append('max_price', state.filters.maxPrice);
        }
        if (state.filters.ratingMin > 0) {
          params.append('rating_min', state.filters.ratingMin);
        }
        if (state.filters.bedType) {
          params.append('bed_type', state.filters.bedType);
        }
        if (state.filters.amenities.length > 0) {
          params.append('amenities', state.filters.amenities[0]);
        }

        const res = await api.get(`/hotels?${params.toString()}`);
        if (res.code === 200) {
          state.hotels = res.data.hotels || [];
          state.total = res.data.total || 0;
          renderHotelList();
        }
      } catch (error) {
        section.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <p class="empty-text">加载失败，请稍后重试</p>
          </div>
        `;
      }
    }

    async function loadFilterOptions() {
      try {
        const res = await api.get('/filter-options');
        if (res.code === 200) {
          state.filterOptions = res.data;
          state.filters.minPrice = res.data.price_range?.min || 100;
          state.filters.maxPrice = res.data.price_range?.max || 5000;
        }
      } catch (error) {
        console.error('加载筛选选项失败:', error);
      }
    }

    function initFilterEventListeners() {
      const priceMinSlider = document.getElementById('price-min');
      const priceMaxSlider = document.getElementById('price-max');
      
      if (priceMinSlider) {
        priceMinSlider.addEventListener('input', function() {
          let minVal = parseInt(this.value);
          let maxVal = parseInt(priceMaxSlider.value);
          if (minVal > maxVal) {
            minVal = maxVal;
            this.value = minVal;
          }
          state.filters.minPrice = minVal;
          updatePriceDisplay();
          updateSliderFill();
        });
      }
      
      if (priceMaxSlider) {
        priceMaxSlider.addEventListener('input', function() {
          let maxVal = parseInt(this.value);
          let minVal = parseInt(priceMinSlider.value);
          if (maxVal < minVal) {
            maxVal = minVal;
            this.value = maxVal;
          }
          state.filters.maxPrice = maxVal;
          updatePriceDisplay();
          updateSliderFill();
        });
      }

      const presetBtns = document.querySelectorAll('.price-preset-btn');
      presetBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          const preset = this.dataset.preset;
          const [min, max] = preset.split('-').map(Number);
          setPricePreset(min, max);
        });
      });

      const ratingSelect = document.getElementById('rating-select');
      if (ratingSelect) {
        ratingSelect.addEventListener('change', function() {
          const rating = parseFloat(this.value);
          state.filters.ratingMin = rating;
        });
      }

      const bedTypeSelect = document.getElementById('bed-type-select');
      if (bedTypeSelect) {
        bedTypeSelect.addEventListener('change', function() {
          state.filters.bedType = this.value;
        });
      }

      const amenityOptions = document.querySelectorAll('.amenity-option');
      amenityOptions.forEach(option => {
        option.addEventListener('click', function() {
          const amenity = this.dataset.amenity;
          toggleAmenity(amenity);
        });
      });

      const filterHeaders = document.querySelectorAll('.filter-group-header');
      filterHeaders.forEach(header => {
        header.addEventListener('click', function() {
          const group = this.dataset.filterGroup;
          if (group === 'amenities' || group === 'price') {
            toggleFilterGroup(group);
          }
        });
      });
    }

    function updateSliderFill() {
      const fill = document.getElementById('slider-fill');
      const minSlider = document.getElementById('price-min');
      const maxSlider = document.getElementById('price-max');
      
      if (!fill || !minSlider || !maxSlider) return;
      
      const minVal = parseInt(minSlider.value);
      const maxVal = parseInt(maxSlider.value);
      const globalMin = parseInt(minSlider.min);
      const globalMax = parseInt(maxSlider.max);
      
      const range = globalMax - globalMin;
      const leftPercent = ((minVal - globalMin) / range) * 100;
      const rightPercent = 100 - ((maxVal - globalMin) / range) * 100;
      
      fill.style.left = leftPercent + '%';
      fill.style.right = rightPercent + '%';
    }

    function updatePriceDisplay() {
      const minDisplay = document.getElementById('price-min-display');
      const maxDisplay = document.getElementById('price-max-display');
      if (minDisplay) minDisplay.textContent = '¥' + state.filters.minPrice;
      if (maxDisplay) maxDisplay.textContent = '¥' + state.filters.maxPrice;
    }

    function selectRating(value) {
      state.filters.ratingMin = state.filters.ratingMin === value ? 0 : value;
      
      const allOptions = document.querySelectorAll('.rating-option');
      allOptions.forEach(option => {
        const rating = parseFloat(option.dataset.rating);
        if (rating === state.filters.ratingMin) {
          option.classList.add('active');
        } else {
          option.classList.remove('active');
        }
      });
    }

    function selectBedType(bedType) {
      if (state.filters.bedType === bedType && bedType !== '') {
        state.filters.bedType = '';
      } else {
        state.filters.bedType = bedType;
      }
      
      const allOptions = document.querySelectorAll('.bed-type-option');
      allOptions.forEach(option => {
        const bt = option.dataset.bedType;
        if (bt === state.filters.bedType) {
          option.classList.add('active');
        } else {
          option.classList.remove('active');
        }
      });
    }

    function toggleAmenity(amenity) {
      const index = state.filters.amenities.indexOf(amenity);
      const option = document.querySelector(`.amenity-option[data-amenity="${amenity}"]`);
      
      if (index > -1) {
        state.filters.amenities.splice(index, 1);
        if (option) option.classList.remove('active');
      } else {
        state.filters.amenities.push(amenity);
        if (option) option.classList.add('active');
      }
    }

    function applyFilters() {
      state.currentPage = 1;
      loadHotels();
    }

    function resetFilters() {
      state.filters.minPrice = state.filterOptions.price_range?.min || 100;
      state.filters.maxPrice = state.filterOptions.price_range?.max || 5000;
      state.filters.ratingMin = 0;
      state.filters.bedType = '';
      state.filters.amenities = [];
      state.selectedCity = '';
      state.currentPage = 1;
      
      const minSlider = document.getElementById('price-min');
      const maxSlider = document.getElementById('price-max');
      if (minSlider) minSlider.value = state.filters.minPrice;
      if (maxSlider) maxSlider.value = state.filters.maxPrice;
      
      updatePriceDisplay();
      updateSliderFill();
      
      const ratingSelect = document.getElementById('rating-select');
      if (ratingSelect) ratingSelect.value = '0';
      
      const bedTypeSelect = document.getElementById('bed-type-select');
      if (bedTypeSelect) bedTypeSelect.value = '';
      
      const allAmenityOptions = document.querySelectorAll('.amenity-option');
      allAmenityOptions.forEach(option => {
        option.classList.remove('active');
      });
      
      const presetBtns = document.querySelectorAll('.price-preset-btn');
      presetBtns.forEach(btn => {
        btn.classList.remove('active');
      });
      
      loadHotels();
    }

    function toggleFilterGroup(filter) {
      state.filterExpanded[filter] = !state.filterExpanded[filter];
      const content = document.querySelector(`.filter-content[data-content="${filter}"]`);
      const toggle = document.querySelector(`.filter-toggle[data-toggle="${filter}"]`);
      
      if (content) {
        if (state.filterExpanded[filter]) {
          content.classList.remove('collapsed');
        } else {
          content.classList.add('collapsed');
        }
      }
      if (toggle) {
        if (state.filterExpanded[filter]) {
          toggle.classList.remove('collapsed');
          toggle.textContent = '−';
        } else {
          toggle.classList.add('collapsed');
          toggle.textContent = '+';
        }
      }
    }

    function setPricePreset(min, max) {
      state.filters.minPrice = min;
      state.filters.maxPrice = max;
      
      const minSlider = document.getElementById('price-min');
      const maxSlider = document.getElementById('price-max');
      if (minSlider) minSlider.value = min;
      if (maxSlider) maxSlider.value = max;
      
      updatePriceDisplay();
      updateSliderFill();
      
      const presetBtns = document.querySelectorAll('.price-preset-btn');
      presetBtns.forEach(btn => {
        const preset = btn.dataset.preset;
        const [btnMin, btnMax] = preset.split('-').map(Number);
        if (btnMin === min && btnMax === max) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

      const citySelect = document.getElementById('city-select');

                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">入住日期</label>
                    <input type="date" class="form-input" id="book-check-in" value="${checkInDate}" min="${today}" max="${maxDate}" onchange="updateBookingPrice()">
                  </div>
                  <div class="form-group">
                    <label class="form-label">离店日期</label>
                    <input type="date" class="form-input" id="book-check-out" value="${checkOutDate}" min="${checkInDate}" max="${maxDate}" onchange="updateBookingPrice()">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">入住人姓名</label>
                    <input type="text" class="form-input" id="book-guest-name" placeholder="请输入姓名">
                  </div>
                  <div class="form-group">
                    <label class="form-label">联系电话</label>
                    <input type="tel" class="form-input" id="book-guest-phone" placeholder="请输入手机号">
                  </div>
                </div>
              </div>
              <div class="booking-price-summary" id="booking-price-summary">
                <div class="price-row">
                  <span class="price-label">房费：¥${room.price} × 1 晚</span>
                  <span class="price-amount">¥${room.price}</span>
                </div>
                <div class="price-row total">
                  <span class="price-label">总计</span>
                  <span class="price-amount total">¥${room.price}</span>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-cancel" onclick="closeBookingModal()">取消</button>
              <button class="btn-confirm" onclick="submitBooking()">确认预订</button>
            </div>
          </div>
        </div>
      `;
    }

    function updateBookingPrice() {
      const checkIn = document.getElementById('book-check-in')?.value;
      const checkOut = document.getElementById('book-check-out')?.value;
      const room = state.selectedRoom;
      const summary = document.getElementById('booking-price-summary');

      if (!checkIn || !checkOut || !room || !summary) return;

      const start = new Date(checkIn);
      const end = new Date(checkOut);
      const nights = Math.max(1, Math.floor((end - start) / (1000 * 60 * 60 * 24)));
      const total = room.price * nights;

      summary.innerHTML = `
        <div class="price-row">
          <span class="price-label">房费：¥${room.price} × ${nights} 晚</span>
          <span class="price-amount">¥${total}</span>
        </div>
        <div class="price-row total">
          <span class="price-label">总计</span>
          <span class="price-amount total">¥${total}</span>
        </div>
      `;
    }

    function closeBookingModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('modal-container').innerHTML = '';
      state.selectedRoom = null;
    }

    async function submitBooking() {
      const checkIn = document.getElementById('book-check-in')?.value;
      const checkOut = document.getElementById('book-check-out')?.value;
      const guestName = document.getElementById('book-guest-name')?.value;
      const guestPhone = document.getElementById('book-guest-phone')?.value;
      const room = state.selectedRoom;
      const hotel = state.currentHotel;

      if (!checkIn || !checkOut || !guestName || !guestPhone) {
        showToast('请填写完整信息', 'error');
        return;
      }

      try {
        const res = await api.post('/orders', {
          hotel_id: hotel.id,
          room_id: room.id,
          check_in: checkIn,
          check_out: checkOut,
          guest_name: guestName,
          guest_phone: guestPhone
        });

        if (res.code === 200) {
          closeBookingModal();
          showToast('预订成功！', 'success');
          showSuccessModal();
        } else {
          showToast(res.message || '预订失败', 'error');
        }
      } catch (error) {
        showToast('预订失败，请稍后重试', 'error');
      }
    }

    function showSuccessModal() {
      const container = document.getElementById('modal-container');
      container.innerHTML = `
        <div class="modal-overlay" onclick="closeSuccessModal(event)">
          <div class="modal-content success-modal" onclick="event.stopPropagation()">
            <div class="success-icon">✅</div>
            <h3 class="success-title">预订成功！</h3>
            <p class="success-text">您的订单已确认，我们会为您预留房间。</p>
            <div class="success-actions">
              <button class="btn-secondary" onclick="closeSuccessModal()">继续浏览</button>
              <a class="btn-primary" onclick="closeSuccessModal(); router.navigate('/orders')">查看订单</a>
            </div>
          </div>
        </div>
      `;
    }

    function closeSuccessModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('modal-container').innerHTML = '';
    }

    async function loadOrders() {
      const content = document.getElementById('orders-content');
      try {
        const params = new URLSearchParams({
          page: 1,
          page_size: 20
        });
        if (state.orderStatus) {
          params.append('status', state.orderStatus);
        }

        const res = await api.get(`/orders?${params.toString()}`);
        if (res.code === 200) {
          state.orders = res.data.orders || [];
          renderOrderList();
        }
      } catch (error) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <p class="empty-text">加载失败，请稍后重试</p>
          </div>
        `;
      }
    }

    function filterOrders(status) {
      state.orderStatus = status;
      document.querySelectorAll('.status-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');
      loadOrders();
    }

    function renderOrderList() {
      const content = document.getElementById('orders-content');

      if (state.orders.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p class="empty-text">暂无订单记录</p>
            <a class="btn-go-book" onclick="router.navigate('/')">去预订酒店</a>
          </div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="orders-list">
          ${state.orders.map(order => `
            <div class="order-card">
              <div class="order-header">
                <div class="order-info">
                  <span class="order-no">订单号：${order.order_no}</span>
                  <span class="order-date">${formatDate(order.created_at)}</span>
                </div>
                <span class="order-status ${getStatusClass(order.status)}">
                  ${getStatusText(order.status)}
                </span>
              </div>
              <div class="order-content">
                <div class="hotel-info">
                  <h3 class="hotel-name">${order.hotel_name || '酒店'}</h3>
                  <p class="room-name">${order.room_name || '房型'}</p>
                  <div class="stay-dates">
                    <div class="date-item">
                      <span class="date-label">入住</span>
                      <span class="date-value">${order.check_in}</span>
                    </div>
                    <span class="date-arrow">→</span>
                    <div class="date-item">
                      <span class="date-label">离店</span>
                      <span class="date-value">${order.check_out}</span>
                    </div>
                  </div>
                  <div class="guest-info">
                    <span class="guest-item">入住人：${order.guest_name}</span>
                    <span class="guest-item">电话：${order.guest_phone}</span>
                  </div>
                </div>
                <div class="price-actions">
                  <div class="price-info">
                    <span class="price-label">订单金额</span>
                    <span class="price-value" style="font-size: 20px; font-weight: 600; color: #e74c3c;">¥${order.total_amount}</span>
                  </div>
                  <div class="order-actions">
                    ${(order.status === 'confirmed' || order.status === 'pending') 
                      ? `<button class="btn-cancel-order" onclick="cancelOrder(${order.id})">取消订单</button>`
                      : ''
                    }
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    async function cancelOrder(orderId) {
      if (!confirm('确定要取消该订单吗？')) return;
      try {
        const res = await api.post(`/orders/${orderId}/cancel`);
        if (res.code === 200) {
          showToast('订单已取消', 'success');
          loadOrders();
        } else {
          showToast(res.message || '取消失败', 'error');
        }
      } catch (error) {
        showToast('取消失败，请稍后重试', 'error');
      }
    }

    function switchTab(tab) {
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');

      if (tab === 'login') {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await api.post('/login', { username, password });
        if (res.code === 200) {
          state.user = res.data;
          localStorage.setItem('user', JSON.stringify(res.data));
          updateUserUI();
          showToast('登录成功！', 'success');
          router.navigate('/');
        } else {
          showToast(res.message || '登录失败', 'error');
        }
      } catch (error) {
        showToast('登录失败，请稍后重试', 'error');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm-password').value;
      const email = document.getElementById('reg-email').value;
      const phone = document.getElementById('reg-phone').value;

      if (password !== confirmPassword) {
        showToast('两次输入的密码不一致', 'error');
        return;
      }

      try {
        const res = await api.post('/register', { username, password, email, phone });
        if (res.code === 200) {
          showToast('注册成功！请登录', 'success');
          switchTab('login');
          document.getElementById('login-username').value = username;
          document.getElementById('login-password').value = '';
        } else {
          showToast(res.message || '注册失败', 'error');
        }
      } catch (error) {
        showToast('注册失败，请稍后重试', 'error');
      }
    }

    const router = {
      routes: {
        '/': pages.home,
        '/login': pages.login,
        '/orders': pages.orders
      },

      getParams() {
        const path = window.location.pathname;
        const match = path.match(/^\/hotel\/(\d+)$/);
        if (match) {
          return { id: match[1] };
        }
        return {};
      },

      navigate(path) {
        window.history.pushState({}, '', path);
        this.render();
      },

      render() {
        const path = window.location.pathname;
        
        if (path === '/' || path === '') {
          pages.home();
        } else if (path === '/login') {
          pages.login();
        } else if (path === '/orders') {
          pages.orders();
        } else if (path.startsWith('/hotel/')) {
          pages.hotelDetail();
        } else {
          pages.home();
        }
      },

      init() {
        window.addEventListener('popstate', () => this.render());
        this.render();
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      initUser();
      router.init();
    });
  </script>
</body>
</html>
